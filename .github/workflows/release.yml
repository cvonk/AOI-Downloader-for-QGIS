name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write        # needed to create the release and upload the asset

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin zip
        # git archive uses the committed tree, so no __pycache__/.pyc sneaks in.
        # The zip contains a top-level aoi_downloader/ folder ready to drop into
        # a QGIS plugins directory.
        run: git archive --format=zip -o "aoi_downloader-${{ github.ref_name }}.zip" HEAD aoi_downloader

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: aoi_downloader-*.zip
          generate_release_notes: true
